name: Generic Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  source-generator-sdk8:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 8.0.x

    - name: Build source generator with extended analyzer rules
      run: dotnet build MBW.HassMQTT.SourceGenerators/MBW.HassMQTT.SourceGenerators.csproj -warnaserror

    - name: Load source generator in a .NET 8 SDK consumer build
      run: dotnet build MBW.HassMQTT.DiscoveryModels/MBW.HassMQTT.DiscoveryModels.csproj -p:RuntimeTargetFrameworks=net8.0

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 50
    - run: git fetch --tags

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: "[ -f .ci-skip-tests ] && echo 'Skipping tests' || dotnet test --no-build --verbosity normal"

    - name: Pack
      if: github.ref == 'refs/heads/master'
      run: dotnet pack -c Debug -o Build

    - name: "Github packages: Nuget push"
      if: github.ref == 'refs/heads/master'
      run: dotnet nuget push --no-symbols --skip-duplicate -k ${{ secrets.GITHUB_TOKEN }} -s "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" Build/*.nupkg
      
    - name: "Github packages: Cleanup"
      if: github.ref == 'refs/heads/master'
      uses: stripethree/gpr-janitor@dist
      with:
        dry-run: false
        keep-versions: 25
        min-age-days: 14
        versions-to-fetch: 20
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
